{% extends 'base.html' %}
{% block title %}404 – Page Not Found{% endblock %}
{% block content %}
<div class="text-center py-5 mt-5">
    <div style="font-size:6rem; opacity:.15">404</div>
    <h4 class="fw-bold text-muted">Page not found</h4>
    <p class="text-muted">The page you're looking for doesn't exist.</p>
    <a href="{{ url_for('dashboard') if session.get('user_id') else url_for('index') }}" class="btn btn-primary mt-2">
        <i class="fas fa-home me-2"></i>Back to Home
    </a>
</div>
{% endblock %}
