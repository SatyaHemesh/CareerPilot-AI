{% extends 'base.html' %}
{% block title %}Error – CareerPilot AI{% endblock %}
{% block content %}
<div class="text-center py-5 mt-5">
    <i class="fas fa-exclamation-triangle text-danger mb-3" style="font-size:4rem"></i>
    <h4 class="fw-bold">Something went wrong</h4>
    <p class="text-muted">{{ message }}</p>
    <a href="{{ url_for('dashboard') if session.get('user_id') else url_for('index') }}" class="btn btn-primary mt-2">
        <i class="fas fa-home me-2"></i>Back to Home
    </a>
</div>
{% endblock %}
